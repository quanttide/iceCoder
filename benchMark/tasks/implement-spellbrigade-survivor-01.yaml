timeout_minutes: 240
max_turns: 200

observability:
  complexity:
    - 10 角色 × 独立技能表现
    - 4 档经验球 + 升级 3 选 1 + Luck 曲线
    - 3 地图 × 不同怪物池
    - 随机任务调度 + 局外商城 localStorage
    - Phaser 场景 ≥ 5（Boot/Menu/Select/Game/Shop/GameOver）
  long_running:
    - 典型 120+ 轮：搭场景 → 战斗循环 → UI → 素材 → 元进度 → E2E 修 flaky
  recovery:
    - 素材缺失探针（manifest 与文件一致性）
    - 占位图检测（过小 PNG / 纯色块）
    - Luck 边界（0 与 100）
    - 商城金币不足不可购买
  exploration:
    - 需读 REQUIREMENTS + GAME-DESIGN + ACCEPTANCE + 单测契约
    - Phaser 加载与 dist 路径

scoring_hints:
  judge_focus:
    - D1：10 角色、3 地图、商城、随机任务是否都可玩
    - D2：Luck 影响升级、经验档、任务奖励是否正确
    - D3：场景划分、Phaser 生命周期、元进度持久化
    - D5：是否 npm test → build → test:e2e 迭代
    - D6：ASSETS.md 与 manifest 是否完整
  visual_judge_supplement:
    - 截图或 Playwright 产物中角色/怪物是否为贴图而非色块
    - UI 是否可读（字体、对比度、血条/经验条）
    - 三地图视觉是否可区分
  common_failure_modes:
    - Phase 1 完成后输出总结并停止（违反执行纪律）
    - 询问用户是否继续而非自动进入下一 Phase
    - 仅 Canvas 色块，未下载素材（Gate 素材审计失败）
    - 10 角色数据重复 skillId
    - 改 test 或 package.json 凑过
    - 无局外商城或金币不持久化
    - E2E 未 build dist 就测
