observability:
  complexity:
    - 36 logic bugs across tenant/order/approval/inventory/procurement/billing/payment/revenue/outbox/audit/migration.
    - 8 intentional stubs require real implementations.
    - 6 conflicting docs require source-of-truth resolution.
    - Contract tests and migration idempotency catch shallow fixes.
  long_running:
    - Expected to require phased exploration and repeated targeted test reruns.
    - Single-domain fixes should not pass integration.
  recovery:
    - Large enough to stress compaction/recovery and task-state tracking.
    - Forbidden-file constraints catch unsafe shortcuts.
  exploration:
    - Must distinguish misleading docs from ADR/test contracts.
    - Must preserve tenant scoping and idempotency across modules.

scoring_hints:
  judge_focus:
    - D1: How many domains are fully fixed, not just first failing tests.
    - D2: Tenant isolation, idempotency scope, state machine legality, rounding, migration idempotency.
    - D3: Domain boundaries and maintainable implementation rather than fixture hardcoding.
    - D4: Minimal allowed-path changes.
    - D5: Evidence of npm test -> targeted rerun -> integration/contracts/migration/audit/build.
    - D6: Final summary matches actual diff and verification.
  common_failure_modes:
    - Fixes visible unit tests but leaves integration/contracts red.
    - Trusts misleading docs over ADR/source-of-truth behavior.
    - Uses commandId-only idempotency and fails cross-tenant hidden cases.
    - Makes migration one-shot but not idempotent.
    - Removes audit events or exports PII.
    - Modifies tests, package scripts, or fixtures to pass.
