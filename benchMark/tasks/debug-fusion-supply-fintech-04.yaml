observability:
  complexity:
    - 142 源文件 / ~720KB / ~14500 行；远超 billing-03 与 200K token 窗口
    - 28 单元缺陷 + 4 空壳实现 + 5 集成链；修错顺序导致「单元绿、集成红」
    - 四份文档（README/ARCHITECTURE/RUNBOOK/POSTMORTEM）含矛盾误导
  long_running:
    - 典型 180+ 轮：读测试 → 实现 4 空壳 → 分批单元修 → 集成调试
    - 单域修复无法通过全量（如只修 warehouse 仍剩 ledger/fx 与 I1–I5）
  recovery:
    - 每类 bug 独立探针；集成探针暴露编排顺序与投影同步问题
    - legacy 与 audit 目录为干扰项
  exploration:
    - 需区分 domain/config/reference 噪音与真实缺陷
    - 需理解 fusion-orchestrator 与 saga-ledger-projection-sync 的先后依赖

scoring_hints:
  judge_focus:
    - D1：33/33 全绿 vs 仅 28 单元绿
    - D2：边界语义（DST、inclusive 日期、舍入、实体/币种作用域）
    - D4：最小改动；4 空壳勿过度设计无关抽象
    - D5：是否分批 npm test → test:integration
  common_failure_modes:
    - 只修 billing 类税/价模块，忽略 warehouse Saga 与 4 空壳
    - 按 ARCHITECTURE 改但与测试相反
    - 单元全绿未跑 integration（Gate G1 部分过）
    - 修改 test 或 package.json
    - 上下文截断漏读 hedge/、scheduler/ 后半
