<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>iceCoder</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/chat-execution-plan.css">
</head>
<body>
  <div id="app">
    <!-- 顶部导航 -->
    <nav class="top-nav" id="top-nav">
      <div class="nav-brand">
        <span class="logo-text">IceCoder</span>
      </div>
      <div class="nav-links">
        <button class="nav-link" data-page="chat" id="nav-chat">聊天</button>
        <button class="nav-link" data-page="memory" id="nav-memory">记忆</button>
        <button class="nav-link" data-page="config" id="nav-config">配置</button>
      </div>
      <div class="nav-right">
        <button class="supervisor-mode-toggle" id="supervisor-mode-toggle" type="button" title="监管模式（点击切换）">
          <span class="supervisor-mode-label" id="supervisor-mode-label">自适应</span>
        </button>
        <button class="theme-toggle" id="theme-toggle" title="切换主题">
          <span class="theme-icon" id="theme-icon">Light</span>
        </button>
        <div class="nav-status">
          <span class="status-dot disconnected" id="status-dot" title="连接中…"></span>
        </div>
      </div>
    </nav>

    <!-- 页面容器 -->
    <div class="page-container" id="page-container"></div>
  </div>

  <script src="/js/modal.js"></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
