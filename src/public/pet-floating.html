<!DOCTYPE html>
<html lang="zh-CN" data-pet-floating="1">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>冰豆 · 桌面悬浮</title>
  <script>
    (function () {
      var t = 'dark';
      try { t = localStorage.getItem('ice-theme') || 'dark'; } catch (e) { /* ignore */ }
      document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
    })();
  </script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/chat.css">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    #pet-shell {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 10px 16px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      -webkit-app-region: drag;
    }
    body[data-pet-floating="1"] .session-pet-indicator {
      position: relative;
      bottom: auto;
      left: auto;
      transform: none;
      pointer-events: none;
      margin: 0;
      overflow: visible;
      gap: 4px;
    }
    body[data-pet-floating="1"] .pet-bubble {
      max-width: 280px;
      white-space: normal;
      word-break: break-word;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }
    body[data-pet-floating="1"] .status-turn {
      display: none;
      max-width: 280px;
      text-align: center;
    }
    body[data-pet-floating="1"] .status-turn:not(:empty) {
      display: block;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      line-height: 1.3;
      color: var(--text-muted);
      opacity: 0.85;
      text-shadow: none;
      background: none;
      padding: 0;
    }
    body[data-pet-floating="1"] .pet-token-hint {
      display: none;
    }
    body[data-pet-floating="1"] .pet-canvas {
      width: 96px;
      height: 96px;
      max-width: none;
      max-height: none;
      flex-shrink: 0;
      pointer-events: auto;
      -webkit-app-region: no-drag;
      filter: none;
      box-shadow: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    body[data-pet-floating="1"] .pet-canvas:focus,
    body[data-pet-floating="1"] .pet-canvas:active,
    body[data-pet-floating="1"] .pet-canvas.pet-dragging {
      filter: none;
      box-shadow: none;
      outline: none;
      transform: none;
    }
  </style>
</head>
<body data-pet-floating="1">
  <div id="pet-shell">
    <div class="session-pet-indicator active" id="pet-root">
      <div class="pet-bubble"></div>
      <canvas class="pet-canvas" id="pet-canvas" width="96" height="96" role="img" aria-label="冰豆 · 桌面悬浮"></canvas>
      <span class="status-turn"></span>
    </div>
  </div>
  <script type="module" src="/js/pet-floating-page.js"></script>
</body>
</html>
