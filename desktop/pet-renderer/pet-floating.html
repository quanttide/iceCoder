<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>IceBean · Floating</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 120px;
      height: 120px;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, "Segoe UI", "PingFang SC", system-ui, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }
    #pet-root {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag; /* 整窗可拖；canvas 内单点也算 drag */
    }
    #pet-canvas {
      width: 96px;
      height: 96px;
      display: block;
      background: transparent;
    }
    #pet-fallback {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="pet-root">
    <canvas id="pet-canvas" width="96" height="96" aria-label="冰豆 · 桌面悬浮"></canvas>
    <div id="pet-fallback" hidden></div>
  </div>
  <script type="module" src="./pet-floating.js"></script>
</body>
</html>
